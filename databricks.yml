# Declarative Automation Bundle for a reusable Python-wheel Databricks agent project.
# See the official Databricks bundle + Python wheel docs for the patterns this starter follows.

bundle:
  # TEMPLATE_CUSTOMIZE_HERE
  # Rename the bundle for your downstream app and keep it aligned with your deployment naming.
  name: databricks-mcp-agent-hello-world

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

variables:
  task_input_json:
    # TEMPLATE_CUSTOMIZE_HERE
    # Replace this placeholder with task input for your own task family. See
    # examples/demo_run_task.json for the canonical sample task.
    description: JSON string containing task-specific input. See examples/demo_run_task.json for the canonical sample task.
    default: '{"task_name":"replace_me","instructions":"See examples/demo_run_task.json for the canonical sample task.","payload":{}}'

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://your-workspace.cloud.databricks.com
  prod:
    mode: production
    workspace:
      host: https://your-workspace.cloud.databricks.com
