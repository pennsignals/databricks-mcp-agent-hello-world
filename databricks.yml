# Declarative Automation Bundle for a reusable Python-wheel Databricks agent project.
# This template retains both dev and prod targets.
# Only dev CD deployment is implemented by the template today.

bundle:
  # TEMPLATE_CUSTOMIZE_HERE
  name: databricks-mcp-agent-hello-world

variables:
  dev_workspace_host:
    description: Databricks workspace host URL for the dev target
  prod_workspace_host:
    description: Databricks workspace host URL for the prod target

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: python scripts/build_wheel.py

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: ${var.dev_workspace_host}
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}

  prod:
    mode: production
    workspace:
      host: ${var.prod_workspace_host}
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
