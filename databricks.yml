# Declarative Automation Bundle for a reusable Python-wheel Databricks agent project.
# This template supports:
# - local: personal developer deployment
# - dev: shared service-principal-owned non-prod CD deployment
# - prod: future service-principal-owned production deployment

bundle:
  # TEMPLATE_CUSTOMIZE_HERE
  name: databricks-mcp-agent-hello-world

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: python scripts/build_wheel.py

targets:
  local:
    mode: development
    default: true
    workspace:
      root_path: ~/.bundle/${bundle.name}/${bundle.target}

  dev:
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
    presets:
      name_prefix: "dev_"
      trigger_pause_status: PAUSED

  prod:
    mode: production
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
    git:
      branch: main
