# Copy this file to workspace-config.yml at the repo root before validating or deploying.
# Local CLI commands read workspace-config.yml from the repo root.
# Databricks Jobs read the deployed copy at ${workspace.file_path}/workspace-config.yml.

tool_provider_type: local_python
llm_endpoint_name: your-llm-endpoint-name
active_profile_name: default
log_level: INFO
max_allowed_tools: 4
max_agent_steps: 8

storage:
  tool_profile_table: main.agent_demo.tool_profiles
  agent_runs_table: main.agent_demo.agent_runs
  agent_output_table: main.agent_demo.agent_outputs
  local_data_dir: ./.local_state

# Optional and future-facing: keep this section only if you plan to add SQL-backed tools later.
sql:
  warehouse_id: your-sql-warehouse-id
  catalog: main
  schema: agent_demo
  incident_kb_table: main.agent_demo.incident_kb
  runbook_table: main.agent_demo.runbook_sections
  customer_summary_table: main.agent_demo.customer_summaries
  service_incidents_table: main.agent_demo.service_incidents
  service_dependencies_table: main.agent_demo.service_dependencies
