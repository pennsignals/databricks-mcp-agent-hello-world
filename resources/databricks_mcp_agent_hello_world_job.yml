resources:
  jobs:
    compile_tool_profile_job:
      name: compile_tool_profile_job
      tasks:
        - task_key: compile_tool_profile
          job_cluster_key: main_cluster
          python_wheel_task:
            package_name: databricks_mcp_agent_hello_world
            entry_point: compile_tool_profile
            named_parameters:
              config_path: /Workspace${workspace.file_path}/workspace-config.yml
          libraries:
            - whl: ../dist/*.whl

      job_clusters:
        - job_cluster_key: main_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_DS3_v2
            autoscale:
              min_workers: 1
              max_workers: 2

    run_agent_task_job:
      name: run_agent_task_job
      tasks:
        - task_key: run_agent_task
          job_cluster_key: main_cluster
          python_wheel_task:
            package_name: databricks_mcp_agent_hello_world
            entry_point: run_agent_task
            named_parameters:
              config_path: /Workspace${workspace.file_path}/workspace-config.yml
              task_input_json: ${var.task_input_json}
          libraries:
            - whl: ../dist/*.whl

      job_clusters:
        - job_cluster_key: main_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_DS3_v2
            autoscale:
              min_workers: 1
              max_workers: 2
