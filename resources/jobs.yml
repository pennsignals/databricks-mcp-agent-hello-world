resources:
  jobs:
    init_storage_job:
      name: init_storage_job
      tasks:
        - task_key: run_init_storage
          environment_key: default
          libraries:
            - whl: ../dist/databricks_mcp_agent_hello_world-*.whl
          python_wheel_task:
            package_name: databricks_mcp_agent_hello_world
            entry_point: run_init_storage
            parameters:
              - --config-path
              - ${workspace.file_path}/workspace-config.yml
      environments:
        - environment_key: default
          spec:
            environment_version: "4"
    run_agent_task_job:
      name: run_agent_task_job
      tasks:
        - task_key: run_agent_task
          environment_key: default
          libraries:
            - whl: ../dist/databricks_mcp_agent_hello_world-*.whl
          python_wheel_task:
            package_name: databricks_mcp_agent_hello_world
            entry_point: run_agent_task
            parameters:
              - --config-path
              - ${workspace.file_path}/workspace-config.yml
              - --task-input-file
              - ${workspace.file_path}/examples/demo_run_task.json
              - --output
              - text
      environments:
        - environment_key: default
          spec:
            environment_version: "4"
