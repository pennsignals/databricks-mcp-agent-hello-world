name: CI

on:
  pull_request:
  push:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('.pre-commit-config.yaml', 'noxfile.py', 'pyproject.toml') }}

      - name: Cache nox environments
        uses: actions/cache@v4
        with:
          path: .nox
          key: nox-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('noxfile.py', 'pyproject.toml') }}

      - name: Install pre-commit and nox
        run: python -m pip install pre-commit nox

      - name: Install pre-commit hook environments
        run: python -m pre_commit install-hooks

      - name: Run default-stage pre-commit hooks
        env:
          SKIP: end-of-file-fixer,trailing-whitespace,nox-precommit
        run: python -m pre_commit run --all-files --show-diff-on-failure

      - name: Run manual-stage pre-commit hooks
        run: python -m pre_commit run --all-files --hook-stage manual --show-diff-on-failure

      - name: Upload coverage.xml
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
