name: CD Dev Deploy on Tag

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  deploy-dev:
    needs: ci
    runs-on: ubuntu-latest
    environment: dev

    env:
      DATABRICKS_AUTH_TYPE: github-oidc
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}

      DEV_LLM_ENDPOINT_NAME: ${{ secrets.DEV_LLM_ENDPOINT_NAME }}
      DEV_AGENT_EVENTS_TABLE: ${{ secrets.DEV_AGENT_EVENTS_TABLE }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@5a9e330acfb8aaf3fcf9b915cca4c7b7e2331c5b

      - name: Mask Databricks values
        shell: bash
        run: |
          echo "::add-mask::$DATABRICKS_HOST"
          echo "::add-mask::$DATABRICKS_CLIENT_ID"
          echo "::add-mask::$DEV_LLM_ENDPOINT_NAME"
          echo "::add-mask::$DEV_AGENT_EVENTS_TABLE"

      - name: Validate required environment secrets
        shell: bash
        run: |
          test -n "$DATABRICKS_HOST"
          test -n "$DATABRICKS_CLIENT_ID"
          test -n "$DEV_LLM_ENDPOINT_NAME"
          test -n "$DEV_AGENT_EVENTS_TABLE"

      - name: Verify tag commit is on main
        shell: bash
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"

      - name: Install release tooling
        run: python -m pip install --upgrade pip build hatch-vcs jinja2

      - name: Render deploy workspace config
        run: python .github/scripts/render_workspace_config.py

      - name: Authenticate to Databricks
        run: databricks current-user me

      - name: Validate bundle
        run: databricks bundle validate --target dev

      - name: Deploy bundle
        run: databricks bundle deploy --target dev

      - name: Initialize storage
        shell: bash
        run: |
          set -euo pipefail

          if databricks bundle run --target dev init_storage_job >/dev/null 2>&1; then
            echo "init_storage_job completed successfully."
          else
            status=$?
            echo "::error::init_storage_job failed. Databricks job output suppressed to avoid leaking sensitive data in GitHub logs."
            exit "$status"
          fi

      - name: Run demo job
        shell: bash
        run: |
          set -euo pipefail

          if databricks bundle run --target dev run_agent_task_job >/dev/null 2>&1; then
            echo "run_agent_task_job completed successfully."
          else
            status=$?
            echo "::error::run_agent_task_job failed. Databricks job output suppressed to avoid leaking sensitive data in GitHub logs."
            exit "$status"
          fi
